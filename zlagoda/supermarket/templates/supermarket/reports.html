{% extends 'supermarket/base.html' %}
{% block title %}— Звіти{% endblock %}
{% block content %}
<div class="card">
  <div class="card-title">PDF Звіти</div>
  <div class="report-grid">
    <div class="report-card">
      <h4>Працівники</h4>
      <a href="{% url 'download_report' 'employees' %}" class="btn btn-green">Завантажити PDF</a>
    </div>
    <div class="report-card">
      <h4>Клієнти</h4>
      <a href="{% url 'download_report' 'customers' %}" class="btn btn-green">Завантажити PDF</a>
    </div>
    <div class="report-card">
      <h4>Товари</h4>
      <a href="{% url 'download_report' 'products' %}" class="btn btn-green">Завантажити PDF</a>
    </div>
    <div class="report-card">
      <h4>Товари в магазині</h4>
      <a href="{% url 'download_report' 'store_products' %}" class="btn btn-green">Завантажити PDF</a>
    </div>
    <div class="report-card">
      <h4>Чеки</h4>
      <form method="get" action="{% url 'download_report' 'checks' %}">
        <div class="form-group"><label>Касир ID</label><input type="text" name="employee_id"></div>
        <div class="form-group"><label>З</label><input type="date" name="date_from"></div>
        <div class="form-group"><label>По</label><input type="date" name="date_to"></div>
        <button class="btn btn-green">Завантажити PDF</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
