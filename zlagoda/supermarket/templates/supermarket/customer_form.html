{% extends 'supermarket/base.html' %}
{% block title %}— Клієнт{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
  <div class="card-title">{{ action }} карту клієнта</div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Номер карти</label><input type="text" name="card_number" maxlength="13" value="{{ cust.card_number }}" {% if action == 'Редагувати' %}readonly{% endif %} required></div>
    <div class="form-row-3">
      <div class="form-group"><label>Прізвище</label><input type="text" name="cust_surname" value="{{ cust.cust_surname }}" required></div>
      <div class="form-group"><label>Ім'я</label><input type="text" name="cust_name" value="{{ cust.cust_name }}" required></div>
      <div class="form-group"><label>По батькові</label><input type="text" name="cust_patronymic" value="{{ cust.cust_patronymic }}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Телефон</label><input type="text" name="phone_number" maxlength="13" value="{{ cust.phone_number }}" required></div>
      <div class="form-group"><label>Відсоток знижки</label><input type="number" name="percent" value="{{ cust.percent }}" required></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Місто</label><input type="text" name="city" value="{{ cust.city }}"></div>
      <div class="form-group"><label>Вулиця</label><input type="text" name="street" value="{{ cust.street }}"></div>
      <div class="form-group"><label>Індекс</label><input type="text" name="zip_code" value="{{ cust.zip_code }}"></div>
    </div>
    <button class="btn btn-green">{{ action }}</button>
    <a href="{% url 'customers' %}" class="btn btn-outline">Скасувати</a>
  </form>
</div>
{% endblock %}
