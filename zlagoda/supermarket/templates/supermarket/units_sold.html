{% extends 'supermarket/base.html' %}
{% block title %}— Кількість проданих одиниць{% endblock %}
{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-title">Визначити кількість одиниць проданого товару</div>
  <form method="get">
    <div class="form-group">
      <label>Товар (UPC)</label>
      <select name="upc">
        <option value="">— обрати товар —</option>
        {% for p in store_products %}
        <option value="{{ p.UPC }}" {% if upc == p.UPC %}selected{% endif %}>
          {{ p.product_name }} ({{ p.UPC }})
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>З дати</label><input type="date" name="date_from" value="{{ date_from }}"></div>
      <div class="form-group"><label>По дату</label><input type="date" name="date_to" value="{{ date_to }}"></div>
    </div>
    <button class="btn btn-green">Визначити</button>
  </form>
  {% if result is not None %}
  <div style="margin-top:1.5rem;padding:1rem;background:var(--green-light);border-radius:8px;font-size:1.1rem">
    Продано одиниць: <strong>{{ result }}</strong>
  </div>
  {% endif %}
</div>
{% endblock %}
