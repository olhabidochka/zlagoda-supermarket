{% extends 'supermarket/base.html' %}
{% block title %}— Редагування профілю{% endblock %}
{% block content %}
<div class="card" style="max-width:650px">
  <div class="card-title">Редагування профілю</div>
  <form method="post">
    {% csrf_token %}

    <div class="form-row-3">
      <div class="form-group">
        <label>Прізвище</label>
        <input type="text" name="empl_surname" value="{{ emp.empl_surname }}" required>
      </div>
      <div class="form-group">
        <label>Ім'я</label>
        <input type="text" name="empl_name" value="{{ emp.empl_name }}" required>
      </div>
      <div class="form-group">
        <label>По батькові</label>
        <input type="text" name="empl_patronymic" value="{{ emp.empl_patronymic }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Дата народження <span style="color:var(--muted);font-size:.8rem">(старше 18 років)</span></label>
        <input type="date" name="date_of_birth" value="{{ emp.date_of_birth }}" max="{{ max_date }}" required>
      </div>
      <div class="form-group">
        <label>Дата початку роботи</label>
        <input type="date" name="date_of_start" value="{{ emp.date_of_start }}" required>
      </div>
    </div>

    <div class="form-group">
      <label>Телефон <span style="color:var(--muted);font-size:.8rem">(макс. 13 символів)</span></label>
      <input type="text" name="phone_number" value="{{ emp.phone_number }}" maxlength="13" required>
    </div>

    <div class="form-row-3">
      <div class="form-group">
        <label>Місто</label>
        <input type="text" name="city" value="{{ emp.city }}" required>
      </div>
      <div class="form-group">
        <label>Вулиця</label>
        <input type="text" name="street" value="{{ emp.street }}" required>
      </div>
      <div class="form-group">
        <label>Індекс</label>
        <input type="text" name="zip_code" value="{{ emp.zip_code }}" required>
      </div>
    </div>

    <div style="border-top:1px solid var(--border);margin:1.2rem 0;padding-top:1.2rem">
      <div class="card-title" style="font-size:1rem;margin-bottom:1rem">Зміна пароля</div>
      <div class="form-row">
        <div class="form-group">
          <label>Новий пароль <span style="color:var(--muted);font-size:.8rem">(залиш порожнім якщо не змінювати)</span></label>
          <input type="password" name="new_password" minlength="8">
        </div>
        <div class="form-group">
          <label>Підтвердити новий пароль <span style="color:var(--muted); font-size:.8rem">(повторіть новий пароль)</span></label>
          <input type="password" name="confirm_password" minlength="8">
        </div>
      </div>
    </div>

    <div style="display:flex;gap:.8rem;margin-top:.5rem">
      <button class="btn btn-green">Зберегти зміни</button>
      <a href="{% url 'profile' %}" class="btn btn-outline">Скасувати</a>
    </div>
  </form>
</div>
{% endblock %}
