{% extends 'supermarket/base.html' %}
{% block title %}— Товар у магазині{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
  <div class="card-title">{{ action }} товар у магазині</div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>UPC</label><input type="text" name="UPC" maxlength="12" value="{{ item.UPC }}" {% if action == 'Редагувати' %}readonly{% endif %} required></div>
    <div class="form-group"><label>Товар</label>
      <select name="id_product" required>
        {% for p in products %}<option value="{{ p.id_product }}" {% if item.id_product == p.id_product %}selected{% endif %}>{{ p.product_name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Ціна продажу</label><input type="number" step="0.0001" name="selling_price" value="{{ item.selling_price }}" required></div>
      <div class="form-group"><label>Кількість</label><input type="number" name="products_number" value="{{ item.products_number }}" required></div>
    </div>
    <div class="form-group"><label>UPC акційного (якщо є)</label><input type="text" name="UPC_prom" maxlength="12" value="{{ item.UPC_prom }}"></div>
    <div class="form-group">
      <label><input type="checkbox" name="promotional_product" {% if item.promotional_product %}checked{% endif %}> Акційний товар</label>
    </div>
    <button class="btn btn-green">{{ action }}</button>
    <a href="{% url 'store_products' %}" class="btn btn-outline">Скасувати</a>
  </form>
</div>
{% endblock %}
